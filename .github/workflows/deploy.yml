name: Deploy escl8 to Container Apps

on:
  workflow_run:
    workflows:
      - "Build and push escl8 images"
    types:
      - completed
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

      image-tag:
        description: Image tag to deploy (defaults to workflow SHA)
        required: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AZURE_RESOURCE_GROUP: Escal8
  CONTAINERAPPS_ENVIRONMENT: whatsapp-bot-env
  WEB_APP_NAME: escal8-web
  WORKER_APP_NAME: escal8-worker
  JOB_APP_NAME: escal8-agent-request-rollover
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  WEB_IMAGE_NAME: escal8-agent
  WORKER_IMAGE_NAME: escal8-agent-worker
  JOB_IMAGE_NAME: escal8-agent-job

jobs:
  deploy:
    name: Deploy escl8
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 30
    concurrency:
      group: agent-production-deploy
      cancel-in-progress: false
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    environment: production
    env:
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
      CONTROL_PLANE_DATABASE_URL: ${{ secrets.CONTROL_PLANE_DATABASE_URL }}
      AGENT_DATABASE_URL: ${{ secrets.AGENT_DATABASE_URL }}
      SENANGPAY_MERCHANT_ID: ${{ secrets.SENANGPAY_MERCHANT_ID }}
      SENANGPAY_SECRET_KEY: ${{ secrets.SENANGPAY_SECRET_KEY }}
      PRODUCTION_SENTRY_AUTH_TOKEN: ${{ secrets.PRODUCTION_SENTRY_AUTH_TOKEN }}
      GRAFANA_LOGS_USER: ${{ secrets.GRAFANA_LOGS_USER }}
      GRAFANA_LOGS_API_KEY: ${{ secrets.GRAFANA_LOGS_API_KEY }}
      ACA_OPEN_AI_API: ${{ secrets.ACA_OPEN_AI_API }}
      ACA_PINECONE_API: ${{ secrets.ACA_PINECONE_API }}
      ACA_SERVICE_BUS_CONN: ${{ secrets.ACA_SERVICE_BUS_CONN }}
      ACA_PUBSUB_CONN: ${{ secrets.ACA_PUBSUB_CONN }}
      ACA_FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.ACA_FIREBASE_SERVICE_ACCOUNT_JSON }}
      ACA_AZURE_BLOB_CONNECTION_STRING: ${{ secrets.ACA_AZURE_BLOB_CONNECTION_STRING }}
      ACA_AZURE_QUEUE_CONNECTION_STRING: ${{ secrets.ACA_AZURE_QUEUE_CONNECTION_STRING }}
      ACA_META_SYSTEM_KEY: ${{ secrets.ACA_META_SYSTEM_KEY }}
      ACA_META_APP_SECRET: ${{ secrets.ACA_META_APP_SECRET }}
      ACA_BOT_INTERNAL_API_KEY: ${{ secrets.ACA_BOT_INTERNAL_API_KEY }}
      ACA_OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.ACA_OTEL_EXPORTER_OTLP_HEADERS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Determine environment
        id: env
        shell: bash
        run: |
          echo "target_env=production" >> "$GITHUB_OUTPUT"
          echo "web_app=${WEB_APP_NAME}" >> "$GITHUB_OUTPUT"
          echo "worker_app=${WORKER_APP_NAME}" >> "$GITHUB_OUTPUT"
          echo "job_app=${JOB_APP_NAME}" >> "$GITHUB_OUTPUT"

      - name: Determine image tag
        id: image
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.image-tag }}" ]]; then
            TAG="${{ github.event.inputs.image-tag }}"
          elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            TAG="${{ github.event.workflow_run.head_sha }}"
          else
            TAG="${GITHUB_SHA}"
          fi
          test -n "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Verify required secrets
        shell: bash
        env:
          CONTROL_PLANE_DATABASE_URL: ${{ secrets.CONTROL_PLANE_DATABASE_URL }}
          AGENT_DATABASE_URL: ${{ secrets.AGENT_DATABASE_URL }}
          SENANGPAY_MERCHANT_ID: ${{ secrets.SENANGPAY_MERCHANT_ID }}
          SENANGPAY_SECRET_KEY: ${{ secrets.SENANGPAY_SECRET_KEY }}
          PRODUCTION_SENTRY_AUTH_TOKEN: ${{ secrets.PRODUCTION_SENTRY_AUTH_TOKEN }}
          GRAFANA_LOGS_USER: ${{ secrets.GRAFANA_LOGS_USER }}
          GRAFANA_LOGS_API_KEY: ${{ secrets.GRAFANA_LOGS_API_KEY }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          ACA_OPEN_AI_API: ${{ secrets.ACA_OPEN_AI_API }}
          ACA_PINECONE_API: ${{ secrets.ACA_PINECONE_API }}
          ACA_SERVICE_BUS_CONN: ${{ secrets.ACA_SERVICE_BUS_CONN }}
          ACA_PUBSUB_CONN: ${{ secrets.ACA_PUBSUB_CONN }}
          ACA_FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.ACA_FIREBASE_SERVICE_ACCOUNT_JSON }}
          ACA_AZURE_BLOB_CONNECTION_STRING: ${{ secrets.ACA_AZURE_BLOB_CONNECTION_STRING }}
          ACA_AZURE_QUEUE_CONNECTION_STRING: ${{ secrets.ACA_AZURE_QUEUE_CONNECTION_STRING }}
          ACA_META_SYSTEM_KEY: ${{ secrets.ACA_META_SYSTEM_KEY }}
          ACA_META_APP_SECRET: ${{ secrets.ACA_META_APP_SECRET }}
          ACA_BOT_INTERNAL_API_KEY: ${{ secrets.ACA_BOT_INTERNAL_API_KEY }}
          ACA_OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.ACA_OTEL_EXPORTER_OTLP_HEADERS }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          required=(
            CONTROL_PLANE_DATABASE_URL AGENT_DATABASE_URL
            SENANGPAY_MERCHANT_ID SENANGPAY_SECRET_KEY
            PRODUCTION_SENTRY_AUTH_TOKEN GRAFANA_LOGS_USER GRAFANA_LOGS_API_KEY
            ACR_USERNAME ACR_PASSWORD ACA_OPEN_AI_API ACA_PINECONE_API
            ACA_SERVICE_BUS_CONN ACA_PUBSUB_CONN ACA_FIREBASE_SERVICE_ACCOUNT_JSON
            ACA_AZURE_BLOB_CONNECTION_STRING ACA_AZURE_QUEUE_CONNECTION_STRING
            ACA_META_SYSTEM_KEY ACA_META_APP_SECRET ACA_BOT_INTERNAL_API_KEY
            ACA_OTEL_EXPORTER_OTLP_HEADERS
            JWT_SECRET
          )
          for name in "${required[@]}"; do
            [[ -n "${!name}" ]] || { echo "Missing required secret: $name"; exit 1; }
          done

      - name: Ensure web, worker, and rollover job exist
        shell: bash
        run: |
          WEB_IMAGE="${{ env.ACR_LOGIN_SERVER }}/${{ env.WEB_IMAGE_NAME }}:${{ steps.image.outputs.tag }}"
          WORKER_IMAGE="${{ env.ACR_LOGIN_SERVER }}/${{ env.WORKER_IMAGE_NAME }}:${{ steps.image.outputs.tag }}"
          JOB_IMAGE="${{ env.ACR_LOGIN_SERVER }}/${{ env.JOB_IMAGE_NAME }}:${{ steps.image.outputs.tag }}"

          if ! az containerapp show -g "$AZURE_RESOURCE_GROUP" -n "${{ steps.env.outputs.web_app }}" >/dev/null 2>&1; then
            az containerapp create -g "$AZURE_RESOURCE_GROUP" -n "${{ steps.env.outputs.web_app }}" \
              --environment "$CONTAINERAPPS_ENVIRONMENT" --image "$WEB_IMAGE" \
              --registry-server "$ACR_LOGIN_SERVER" --registry-username "$ACR_USERNAME" \
              --registry-password "$ACR_PASSWORD" --ingress external --target-port 3000 \
              --cpu 0.5 --memory 1Gi --min-replicas 1 --max-replicas 3
          fi
          if ! az containerapp show -g "$AZURE_RESOURCE_GROUP" -n "${{ steps.env.outputs.worker_app }}" >/dev/null 2>&1; then
            az containerapp create -g "$AZURE_RESOURCE_GROUP" -n "${{ steps.env.outputs.worker_app }}" \
              --environment "$CONTAINERAPPS_ENVIRONMENT" --image "$WORKER_IMAGE" \
              --registry-server "$ACR_LOGIN_SERVER" --registry-username "$ACR_USERNAME" \
              --registry-password "$ACR_PASSWORD" \
              --cpu 0.5 --memory 1Gi --min-replicas 1 --max-replicas 3
          fi
          if ! az containerapp job show -g "$AZURE_RESOURCE_GROUP" -n "${{ steps.env.outputs.job_app }}" >/dev/null 2>&1; then
            az containerapp job create -g "$AZURE_RESOURCE_GROUP" -n "${{ steps.env.outputs.job_app }}" \
              --environment "$CONTAINERAPPS_ENVIRONMENT" --image "$JOB_IMAGE" \
              --registry-server "$ACR_LOGIN_SERVER" --registry-username "$ACR_USERNAME" \
              --registry-password "$ACR_PASSWORD" \
              --trigger-type Schedule --cron-expression "0 * * * *" \
              --replica-timeout 1800 --replica-retry-limit 3 \
              --replica-completion-count 1 --parallelism 1
          fi

      - name: Update Web Container App secrets
        shell: bash
        run: |
          az containerapp secret set \
            --name "${{ steps.env.outputs.web_app }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --secrets \
              senangpay-merchant-id="${SENANGPAY_MERCHANT_ID}" \
              senangpay-secret-key="${SENANGPAY_SECRET_KEY}" \
              control-plane-database-url="${CONTROL_PLANE_DATABASE_URL}" \
              database-url="${AGENT_DATABASE_URL}" \
              sentry-auth-token="${PRODUCTION_SENTRY_AUTH_TOKEN}" \
              open-ai-api="${ACA_OPEN_AI_API}" \
              pinecone-api="${ACA_PINECONE_API}" \
              service-bus-conn="${ACA_SERVICE_BUS_CONN}" \
              pubsub-conn="${ACA_PUBSUB_CONN}" \
              firebase-service-account-json="${ACA_FIREBASE_SERVICE_ACCOUNT_JSON}" \
              azure-blob-connection-string="${ACA_AZURE_BLOB_CONNECTION_STRING}" \
              azure-queue-connection-string="${ACA_AZURE_QUEUE_CONNECTION_STRING}" \
              meta-system-key="${ACA_META_SYSTEM_KEY}" \
              meta-app-secret="${ACA_META_APP_SECRET}" \
              bot-internal-api-key="${ACA_BOT_INTERNAL_API_KEY}" \
              otel-exporter-otlp-headers="${ACA_OTEL_EXPORTER_OTLP_HEADERS}" \
              grafana-logs-user="${GRAFANA_LOGS_USER}" \
              grafana-logs-api-key="${GRAFANA_LOGS_API_KEY}" \
              jwt-secret="${JWT_SECRET}"

      - name: Update Worker Container App secrets
        shell: bash
        run: |
          az containerapp secret set \
            --name "${{ steps.env.outputs.worker_app }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --secrets \
              control-plane-database-url="$CONTROL_PLANE_DATABASE_URL" \
              database-url="$AGENT_DATABASE_URL" \
              open-ai-api="$ACA_OPEN_AI_API" \
              pinecone-api-key="$ACA_PINECONE_API" \
              service-bus-conn="$ACA_SERVICE_BUS_CONN" \
              pubsub-conn="$ACA_PUBSUB_CONN" \
              firebase-service-account-json="$ACA_FIREBASE_SERVICE_ACCOUNT_JSON" \
              azure-blob-connection-string="$ACA_AZURE_BLOB_CONNECTION_STRING" \
              azure-queue-connection-string="$ACA_AZURE_QUEUE_CONNECTION_STRING" \
              otel-exporter-otlp-headers="$ACA_OTEL_EXPORTER_OTLP_HEADERS" \
              grafana-logs-user="$GRAFANA_LOGS_USER" \
              grafana-logs-api-key="$GRAFANA_LOGS_API_KEY"

      - name: Update Job secrets
        shell: bash
        run: |
          az containerapp job secret set \
            --name "${{ steps.env.outputs.job_app }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --secrets \
              database-url="$AGENT_DATABASE_URL" \
              grafana-logs-user="$GRAFANA_LOGS_USER" \
              grafana-logs-api-key="$GRAFANA_LOGS_API_KEY"

      - name: Deploy Web Container App (dashboard)
        shell: bash
        run: |
          IMAGE="${{ env.ACR_LOGIN_SERVER }}/${{ env.WEB_IMAGE_NAME }}:${{ steps.image.outputs.tag }}"

          az containerapp update \
            --name "${{ steps.env.outputs.web_app }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --image "$IMAGE" \
            --set-env-vars \
              CONTROL_PLANE_DATABASE_URL=secretref:control-plane-database-url \
              DATABASE_URL=secretref:database-url \
              SENANGPAY_MERCHANT_ID=secretref:senangpay-merchant-id \
              SENANGPAY_SECRET_KEY=secretref:senangpay-secret-key \
              SENANGPAY_HASH_TYPE=sha256 \
              SENANGPAY_SANDBOX=false \
              NEXT_PUBLIC_SENTRY_DSN="${{ secrets.PRODUCTION_NEXT_PUBLIC_SENTRY_DSN }}" \
              SENTRY_AUTH_TOKEN=secretref:sentry-auth-token \
              OPENAI_API_KEY=secretref:open-ai-api \
              PINECONE_API_KEY=secretref:pinecone-api \
              SERVICE_BUS_CONNECTION_STRING=secretref:service-bus-conn \
              WEB_PUBSUB_CONNECTION_STRING=secretref:pubsub-conn \
              FIREBASE_SERVICE_ACCOUNT_JSON=secretref:firebase-service-account-json \
              AZURE_BLOB_CONNECTION_STRING=secretref:azure-blob-connection-string \
              AZURE_QUEUE_CONNECTION_STRING=secretref:azure-queue-connection-string \
              META_SYSTEM_USER_TOKEN=secretref:meta-system-key \
              META_APP_SECRET=secretref:meta-app-secret \
              BOT_INTERNAL_API_KEY=secretref:bot-internal-api-key \
              OTEL_EXPORTER_OTLP_HEADERS=secretref:otel-exporter-otlp-headers \
              GRAFANA_LOGS_USER=secretref:grafana-logs-user \
              GRAFANA_LOGS_API_KEY=secretref:grafana-logs-api-key \
              JWT_SECRET=secretref:jwt-secret \
              SENTRY_ORG="${{ secrets.PRODUCTION_SENTRY_ORG }}" \
              SENTRY_PROJECT="${{ secrets.PRODUCTION_SENTRY_PROJECT }}" \
              NEXT_PUBLIC_SENTRY_ENVIRONMENT=production \
              NEXT_PUBLIC_SENTRY_RELEASE="${{ steps.image.outputs.tag }}" \
              NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE=1 \
              NEXT_PUBLIC_SENTRY_ENABLE_LOGS=true \
              NEXT_PUBLIC_GRAFANA_BROWSER_LOGS_ENABLED=false \
              JWT_SECRET=secretref:jwt-secret

      - name: Deploy Worker Container App (RAG worker)
        shell: bash
        run: |
          IMAGE="${{ env.ACR_LOGIN_SERVER }}/${{ env.WORKER_IMAGE_NAME }}:${{ steps.image.outputs.tag }}"

          az containerapp update \
            --name "${{ steps.env.outputs.worker_app }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --image "$IMAGE" \
            --set-env-vars \
              CONTROL_PLANE_DATABASE_URL=secretref:control-plane-database-url \
              DATABASE_URL=secretref:database-url \
              OPENAI_API_KEY=secretref:open-ai-api \
              PINECONE_API_KEY=secretref:pinecone-api-key \
              SERVICE_BUS_CONNECTION_STRING=secretref:service-bus-conn \
              WEB_PUBSUB_CONNECTION_STRING=secretref:pubsub-conn \
              FIREBASE_SERVICE_ACCOUNT_JSON=secretref:firebase-service-account-json \
              AZURE_BLOB_CONNECTION_STRING=secretref:azure-blob-connection-string \
              AZURE_QUEUE_CONNECTION_STRING=secretref:azure-queue-connection-string \
              OTEL_EXPORTER_OTLP_HEADERS=secretref:otel-exporter-otlp-headers \
              GRAFANA_LOGS_USER=secretref:grafana-logs-user \
              GRAFANA_LOGS_API_KEY=secretref:grafana-logs-api-key \
              RAG_WORKER_MODE=queue \
              RAG_WORKER_POLL_MS=1500

      - name: Deploy Container App Job (requests rollover)
        shell: bash
        run: |
          IMAGE="${{ env.ACR_LOGIN_SERVER }}/${{ env.JOB_IMAGE_NAME }}:${{ steps.image.outputs.tag }}"

          az containerapp job update \
            --name "${{ steps.env.outputs.job_app }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --image "$IMAGE" \
            --cron-expression "0 * * * *" \
            --replica-timeout 1800 \
            --replica-retry-limit 3 \
            --replica-completion-count 1 \
            --parallelism 1 \
            --set-env-vars \
              DATABASE_URL=secretref:database-url \
              GRAFANA_LOGS_USER=secretref:grafana-logs-user \
              GRAFANA_LOGS_API_KEY=secretref:grafana-logs-api-key

      - name: Wait for exact revisions
        shell: bash
        run: |
          for APP in "${{ steps.env.outputs.web_app }}" "${{ steps.env.outputs.worker_app }}"; do
            TARGET_REVISION=$(az containerapp show \
              --name "$APP" \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --query properties.latestRevisionName -o tsv)

            for i in {1..60}; do
              HEALTH=$(az containerapp revision show \
                --name "$APP" \
                --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
                --revision "$TARGET_REVISION" \
                --query properties.healthState -o tsv)
              REVISION_IMAGE=$(az containerapp revision show \
                --name "$APP" \
                --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
                --revision "$TARGET_REVISION" \
                --query "properties.template.containers[0].image" -o tsv)

              if [[ "$HEALTH" == "Healthy" && "$REVISION_IMAGE" == *":${{ steps.image.outputs.tag }}" ]]; then
                echo "$APP revision $TARGET_REVISION is healthy"
                break
              fi
              if [[ "$i" == 60 ]]; then
                echo "$APP revision $TARGET_REVISION did not become healthy (last state: $HEALTH)"
                exit 1
              fi
              echo "$APP revision $TARGET_REVISION is not ready yet (state: $HEALTH)"
              sleep 10
            done
          done

      - name: Health check (web)
        shell: bash
        run: |
          FQDN=$(az containerapp show \
            --name "${{ steps.env.outputs.web_app }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn \
            -o tsv)

          echo "Checking https://$FQDN/api/health"

          for i in {1..20}; do
            if curl -fsS "https://$FQDN/api/health" | grep -q '"ok":true'; then
              echo "Health check passed"
              exit 0
            fi

            echo "Attempt $i/20"
            sleep 10
          done

          exit 1

      - name: Readiness check (web)
        shell: bash
        run: |
          FQDN=$(az containerapp show \
            --name "${{ steps.env.outputs.web_app }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn \
            -o tsv)

          curl -fsS "https://$FQDN/api/ready" | grep -q '"ready":true'

      - name: Smoke test rollover job
        shell: bash
        run: |
          EXECUTION=$(az containerapp job start \
            --name "${{ steps.env.outputs.job_app }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query name -o tsv)
          test -n "$EXECUTION"

          for i in {1..60}; do
            STATUS=$(az containerapp job execution show \
              --name "${{ steps.env.outputs.job_app }}" \
              --job-execution-name "$EXECUTION" \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --query properties.status -o tsv)
            case "$STATUS" in
              Succeeded) echo "Rollover job succeeded"; exit 0 ;;
              Failed) echo "Rollover job failed"; exit 1 ;;
            esac
            sleep 10
          done
          echo "Rollover job timed out"
          exit 1

      - name: Deployment summary
        shell: bash
        run: |
          WEB_FQDN=$(az containerapp show \
            --name "${{ steps.env.outputs.web_app }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn \
            -o tsv)

          WORKER_FQDN=$(az containerapp show \
            --name "${{ steps.env.outputs.worker_app }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn \
            -o tsv)

          echo "## escl8 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ steps.env.outputs.target_env }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web App (Dashboard) | ${{ steps.env.outputs.web_app }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Worker App (RAG) | ${{ steps.env.outputs.worker_app }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Job App (Rollover) | ${{ steps.env.outputs.job_app }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ steps.image.outputs.tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web URL | https://$WEB_FQDN |" >> $GITHUB_STEP_SUMMARY
          echo "| Worker URL | https://$WORKER_FQDN |" >> $GITHUB_STEP_SUMMARY
