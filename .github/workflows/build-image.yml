name: Build and push escl8 images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WEB_IMAGE_NAME: escal8-agent
  WORKER_IMAGE_NAME: escal8-agent-worker
  JOB_IMAGE_NAME: escal8-agent-job

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run lint
      - run: npm audit --omit=dev --audit-level=critical

  build-and-push:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: agent-images-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate image secrets
        run: |
          test -n "${{ secrets.ACR_LOGIN_SERVER }}"
          test -n "${{ secrets.ACR_USERNAME }}"
          test -n "${{ secrets.ACR_PASSWORD }}"

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push web image (dashboard)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha,scope=agent-web
          cache-to: type=gha,mode=max,scope=agent-web
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.WEB_IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.WEB_IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.PRODUCTION_NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.PRODUCTION_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.PRODUCTION_NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.PRODUCTION_NEXT_PUBLIC_FIREBASE_APP_ID }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.PRODUCTION_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.PRODUCTION_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ secrets.PRODUCTION_NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.PRODUCTION_NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_SENTRY_RELEASE=${{ github.sha }}
            NEXT_PUBLIC_SENTRY_ENVIRONMENT=production
            SENTRY_ORG=${{ secrets.PRODUCTION_SENTRY_ORG }}
            SENTRY_PROJECT=${{ secrets.PRODUCTION_SENTRY_PROJECT }}
          secrets: |
            sentry_auth_token=${{ secrets.PRODUCTION_SENTRY_AUTH_TOKEN }}

      - name: Build and push worker image (RAG worker)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          push: true
          cache-from: type=gha,scope=agent-worker
          cache-to: type=gha,mode=max,scope=agent-worker
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.WORKER_IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.WORKER_IMAGE_NAME }}:latest
      - name: Build and push job image (requests rollover cron)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.job
          push: true
          cache-from: type=gha,scope=agent-job
          cache-to: type=gha,mode=max,scope=agent-job
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.JOB_IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.JOB_IMAGE_NAME }}:latest
