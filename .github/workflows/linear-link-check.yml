name: Linear Link Advisory

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

jobs:
  linear-key-advisory:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check for Linear issue key in PR title, body, or branch
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_BRANCH: ${{ github.head_ref }}
        run: |
          combined="${PR_TITLE}
          ${PR_BODY}
          ${PR_BRANCH}"

          if echo "$combined" | grep -Eiq '(ESC-[0-9]+|linear\.app/.*/issue/esc-[0-9]+)'; then
            echo "Linear issue key found."
            exit 0
          fi

          echo "Missing Linear issue key."
          echo "Add a Linear key like ESC-123 to the branch name, PR title, or PR body."
          echo "Example PR title: ESC-123 Improve portal realtime diagnostics"
          echo "This is advisory only. Daily ops will backfill or reconcile missing Linear links."
          exit 0
